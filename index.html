<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustafa & Büşra - Davetiye</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Pinyon+Script&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles" id="particles"></div>

    <main class="page-shell" id="pageShell">
        <section class="screen intro-screen" aria-label="Zarf açılış ekranı">
            <button class="envelope-wrapper" id="envelopeWrapper" type="button" aria-label="Davetiye zarfını aç">
                <span class="envelope">
                    <span class="back-paper"></span>
                    <span class="top-flap"></span>
                    <span class="side-flaps"></span>
                    <span class="front-flap"></span>
                    <span class="bow-ribbon" aria-hidden="true"></span>
                    <span class="gold-seal"><span>B&B</span></span>
                </span>
            </button>

            <p class="hint-text" id="hintText">Açmak için zarfa tıklayınız</p>
        </section>

        <section class="screen invitation-screen" aria-label="Düğün davetiyesi">
            <div class="invitation-page">
                <div class="corner-flower corner-flower-left"></div>
                <div class="corner-flower corner-flower-right"></div>

                <p class="eyebrow">Düğün Davetiyesi</p>
                <h1 class="names">Mustafa & Büşra</h1>
                <div class="divider">✦</div>

                <p class="invitation-text">
                    Birlikteliğimizi evlilikle taçlandıracağımız bu özel günde sizleri de aramızda görmekten mutluluk duyarız.
                </p>

                <div class="wedding-details" aria-label="Düğün detayları">
                    <div class="detail-item">
                        <span class="detail-label">Tarih</span>
                        <span>23 Ağustos 2026</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Saat</span>
                        <span>19:00</span>
                    </div>
                </div>

                <a href="https://maps.google.com" target="_blank" rel="noopener noreferrer" class="maps-btn">
                    Haritada Gör
                </a>

                <button class="return-btn" id="returnBtn" type="button">Zarfa dön</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
