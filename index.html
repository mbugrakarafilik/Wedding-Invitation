<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustafa & Nişanlım - Davetiye</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Pinyon+Script&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Arka plan parıltıları -->
    <div class="particles" id="particles"></div>

    <div class="main-wrapper">
        <!-- Zarf ve Kart Kapsayıcısı -->
        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="envelope">
                
                <!-- Zarfın Üst Kapağı -->
                <div class="top-flap"></div>
                
                <!-- Zarfın Yan Katlamaları -->
                <div class="side-flaps"></div>
                
                <!-- Zarfın Ön Alt Gövdesi -->
                <div class="front-flap"></div>

                <!-- Mühür -->
                <div class="gold-seal"><span>M&N</span></div>

                <!-- Davetiye Kartı -->
                <div class="wedding-card">
                    <div class="card-inner">
                        <h1 class="names">Mustafa & Büşda</h1>
                        <div class="divider">✦</div>
                        <p class="invitation-text">
                            Birlikteliğimizi evlilikle taçlandıracağımız bu özel günde sizleri de aramızda görmekten mutluluk duyarız.
                        </p>
                        
                        <div class="wedding-details">
                            <div class="detail-item">📅 23 Ağustos 2026</div>
                            <div class="detail-item">⏰ Saat: 19:00</div>
                        </div>

                        <!-- İstediğin gibi aşağıya konumlandırılan buton grubu -->
                        <div class="action-zone">
                            <a href="https://maps.google.com" target="_blank" class="maps-btn">
                                🗺️ Haritada Gör
                            </a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        
        <div class="hint-text" id="hintText">Açmak İçin Zarka Tıklayınız</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
